<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mythos Terminal</title>
  <link rel="stylesheet" href="terminal.css">
</head>
<body>
  <div id="cursor"></div>
  <div id="boot-screen"></div>

<div class="terminal">
  <div id="output"></div>

  <div id="boot-input" class="input-line">
    <span class="prompt">></span>
    <span id="typed"></span>
    <span id="fake-cursor"></span>
    <input type="text" id="input" autocomplete="off">
  </div>
</div>

  <script src="terminal.js"></script>
  <script src="echo.js"></script>
</body>
</html>
